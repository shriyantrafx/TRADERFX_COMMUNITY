<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - TradersFX Community</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f1a;
color:white;
}

.container{
max-width:500px;
margin:40px auto;
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
}

img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #00bfff;
}

h2{
color:#00bfff;
margin-top:15px;
}

.info{
margin:15px 0;
padding:12px;
background:#111827;
border-radius:10px;
}

button{
padding:12px 25px;
background:#00bfff;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://via.placeholder.com/120" alt="Profile">

<h2>Trader Name</h2>

<div class="info">Experience: Beginner</div>
<div class="info">Total Trades: 0</div>
<div class="info">Win Rate: 0%</div>

<button>Edit Profile</button>

</div>

</body>
</html>
