<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - TradersFX Community</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f1a;
color:white;
}

header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#00bfff;
margin:0;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#00bfff;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>TradersFX Community</h2>
<button>Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Welcome Trader 👋</h3>
<p>Welcome to your dashboard.</p>
</div>

<div class="card">
<h3>Community</h3>
<p>Community posts will appear here.</p>
</div>

<div class="card">
<h3>Trading Signals</h3>
<p>Signals will be added here.</p>
</div>

</div>

</body>
</html>
