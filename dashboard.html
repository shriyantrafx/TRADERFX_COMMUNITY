<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradersFX Dashboard</title>
<style>

header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#111827;position:sticky;top:0}

<header><div class="logo">TradersFX Community</div><button onclick="alert('Theme coming soon')">🌙</button></header>

<div class="card"><h3>👤 Community Feed</h3><p>Members' posts will appear here.</p></div>
<nav><span>🏠</span><span>🎥</span><span>➕</span><span>💬</span><span>👤</span></nav>
