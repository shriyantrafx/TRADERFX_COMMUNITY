<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - TradersFX Community</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b0f1a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.signup-box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:340px;
text-align:center;
box-shadow:0 0 20px rgba(0,191,255,.3);
}

h2{
color:#00bfff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#00bfff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

a{
color:#00bfff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button onclick="signup()">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>
function signup(){
alert("Account system will be connected soon 🚀");
}
</script>
<script type="module" src="firebase.js"></script>
</body>
</html>
